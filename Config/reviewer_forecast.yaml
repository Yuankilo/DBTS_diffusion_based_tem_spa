model:
  target: Models.interpretable_diffusion.diffusion_v3.Diffusion_TSGCN
  params:
    seq_length: 48
    feature_size: 282
    n_layer_enc: 4
    n_layer_dec: 3
    d_model: 192
    timesteps: 1000
    sampling_timesteps: 1000
    loss_type: "l1"
    beta_schedule: "cosine"
    n_heads: 4
    mlp_hidden_times: 4
    attn_pd: 0.0
    resid_pd: 0.0
    kernel_size: 1
    padding_size: 0

solver:
  base_lr: 1.0e-5
  max_epochs: 7500
  results_folder: ./review_outputs/checkpoints/reviewer_forecast
  gradient_accumulate_every: 2
  save_cycle: 250
  ema:
    decay: 0.995
    update_interval: 10
  scheduler:
    target: engine.lr_sch.ReduceLROnPlateauWithWarmup
    params:
      factor: 0.5
      patience: 5000
      min_lr: 1.0e-5
      threshold: 1.0e-1
      threshold_mode: rel
      warmup_lr: 8.0e-4
      warmup: 500
      verbose: false

data:
  seq_length: 48
  pred_len: 24
  feature_size: 282
  external_dim: 195
  batch_size: 32
  eval_batch_size: 128
  seed: 123

sampling:
  coefficient: 1.0e-2
  step_size: 5.0e-2
  sampling_steps: 200
